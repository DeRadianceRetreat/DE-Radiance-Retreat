<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rukhsaar’s Netflex & Chill</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>




body{margin:0;background:#050509;font-family:sans-serif;color:#fff;}
.nav{position:fixed;top:0;left:0;right:0;height:60px;background:#000c;display:flex;align-items:center;padding:0 12px;z-index:100;}
.nav-title{font-size:16px;font-weight:600;}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.search-input{
  padding:12px 18px;
  border-radius:30px;
  border:1px solid #777;
  background:#000a;
  color:#fff;
  font-size:18px;
  width:220px;
}
.nav-button{
  padding:12px 18px;
  border-radius:30px;
  border:1px solid #777;
  background:#e50914;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  font-weight:600;
}
.page{margin-top:80px;padding:16px;}
.folder{width:160px;height:120px;background:#111c;border:1px solid #333;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:600;margin-bottom:20px;cursor:pointer;}
.genre{padding:14px 0;font-size:18px;border-bottom:1px solid #333;cursor:pointer;}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.tile{width:140px;height:210px;border-radius:14px;background:#111c;border:1px solid #333;overflow:hidden;position:relative;}
.tile img,.tile video{width:100%;height:100%;object-fit:cover;}
.tile-label{position:absolute;bottom:0;width:100%;background:#000a;text-align:center;padding:4px 0;font-size:14px;}
.netflix-title{text-align:center;background:#e50914;padding:16px 0;font-size:26px;font-weight:700;margin-top:10px;}
.progress-bar-container{position:absolute;bottom:0;left:0;width:100%;height:4px;background:#fff3;}
.progress-bar{height:100%;background:#1db954;}
.back{color:#e50914;margin-bottom:10px;cursor:pointer;}
h2,h3{margin:0 0 10px;}
</style>
</head>

<body>

<!-- ⭐ BANNER AT TOP (REPLACES THE BIG RED R) -->
<div style="text-align:center; margin-top:40px;">
  <img src="https://archive.org/download/logo.jpg_20260227/Logo.jpg.jpeg"
       style="width:420px;height:auto;object-fit:contain;">
</div>

<div class="netflix-title">RUKHSAAR'S NETFLEX & CHILL</div>

<!-- PROFILE SCREEN -->
<div id="profile-screen" style="
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:20px;
  gap:0px;
  z-index:9999;
">

  <!-- Banner still above avatar inside profile screen -->
  <img src="https://archive.org/download/logo.jpg_20260227/Logo.jpg.jpeg"
       style="width:420px;height:auto;object-fit:contain;margin-bottom:0px;">

  <!-- Avatar -->
  <img src="https://github.com/DeRadianceRetreat/RKNetflex-Chill/blob/main/images/avatar.jpg?raw=true"
       style="
         width:150px;
         height:150px;
         border-radius:50%;
         border:4px solid #e50914;
         box-shadow:0 0 25px #e509;
         margin-top:-12px;
       ">

  <div style="font-size:22px;font-weight:600;margin-top:6px;">Profile</div>

  <button onclick="enterProfile()"
          style="padding:10px 24px;background:#e50914;border:none;border-radius:6px;color:#fff;font-size:16px;cursor:pointer;margin-top:10px;">
    Continue
  </button>
</div>

<div class="nav">
  <div class="nav-title">My Video Library</div>
  <div class="nav-right">
    <input id="searchInput" class="search-input" placeholder="Search shows, genres..." onkeydown="if(event.key==='Enter')performSearch()">
    <button class="nav-button" onclick="performSearch()">Search</button>
    <button class="nav-button" onclick="castCurrent()">Cast</button>
    <button class="nav-button" onclick="mirrorCurrent()">Mirror</button>
    <button class="nav-button" onclick="wirelessDisplay()">Wireless</button>
  </div>
</div>

<div class="page" id="page"></div>

<!-- CONTINUE WATCHING -->
<div style="padding:16px;">
  <h3>Continue Watching</h3>
  <div class="row">
    <div class="tile">
      <img src="https://archive.org/download/series-poster-covers/THE_NEIGHBOURHOOD_POSTER.jpg">
      <div class="progress-bar-container">
        <div id="cw-progress" class="progress-bar" style="width:0%;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const page=document.getElementById("page");
const searchInput=document.getElementById("searchInput");

function enterProfile(){
  document.getElementById("profile-screen").style.display="none";
  showHome();
}

const genres=["Drama","Sitcom","Thriller","Sci-Fi","cartoon","My Series Favourites"];

const sitcomShows=[
  {name:"Friends",poster:"https://archive.org/download/series-poster-covers/FRIENDS_POSTER.jpg"},
  {name:"The Simpsons",poster:"https://archive.org/download/series-poster-covers/THE_SIMPSONS_POSTER.jpg"},
  {name:"Sam & Cat",poster:"https://archive.org/download/series-poster-covers/SAM_AND_CAT_POSTER.jpg"},
  {name:"2 Broke Girls",poster:"https://archive.org/download/series-poster-covers/TWO_BROKE_GIRLS_POSTER.jpg"},
  {name:"Georgie & Mandy",poster:"https://archive.org/download/series-poster-covers/GEORGIE_AND_MANDY_POSTER.jpg"},
  {name:"The Suite Life on Deck",poster:"https://archive.org/download/series-poster-covers/SUITE_LIFE_ON_DECK_POSTER.jpg"},
  {name:"Drake & Josh",poster:"https://archive.org/download/series-poster-covers/DRAKE_AND_JOSH_POSTER.jpg"},
  {name:"Shake It Up",poster:"https://archive.org/download/series-poster-covers/SHAKE_IT_UP_POSTER.jpg"},
  {name:"Raven's Home",poster:"https://archive.org/download/series-poster-covers/RAVENS_HOME_POSTER.jpg"},
  {name:"Zoey 101",poster:"https://archive.org/download/series-poster-covers/ZOEY_101_POSTER.jpg"},
  {name:"Melissa & Joey",poster:"https://archive.org/download/series-poster-covers/MELISSA_AND_JOEY_POSTER.jpg"},
  {name:"Victorious",poster:"https://archive.org/download/series-poster-covers/VICTORIOUS_POSTER.jpg"},
  {name:"Good Luck Charlie",poster:"https://archive.org/download/series-poster-covers/GOOD_LUCK_CHARLIE_POSTER.jpg"},
  {name:"K.C. Undercover",poster:"https://archive.org/download/series-poster-covers/KC_UNDERCOVER_POSTER.jpg"},
  {name:"Wizards of Waverly Place",poster:"https://archive.org/download/series-poster-covers/WIZARDS_OF_WAVERLY_PLACE_POSTER.jpg"},
  {name:"iCarly",poster:"https://archive.org/download/series-poster-covers/ICARLY_POSTER.jpg"},
  {name:"Family Guy",poster:"https://archive.org/download/series-poster-covers/FAMILY_GUY_POSTER.jpg"},
  {name:"Young Sheldon",poster:"https://archive.org/download/series-poster-covers/YOUNG_SHELDON_POSTER.jpg"},
  {name:"The Big Bang Theory",poster:"https://archive.org/download/series-poster-covers/BIG_BANG_THEORY_POSTER.jpg"}
];

const neighbourhoodPoster="https://archive.org/download/series-poster-covers/THE_NEIGHBOURHOOD_POSTER.jpg";

function showHome(){
  page.innerHTML="";
  const movies=document.createElement("div");
  movies.className="folder";
  movies.textContent="Movies";

  const series=document.createElement("div");
  series.className="folder";
  series.textContent="TV Series";
  series.onclick=()=>openSeries();

  page.appendChild(movies);
  page.appendChild(series);
}

function openSeries(){
  page.innerHTML=`<div class="back" onclick="showHome()">← Back</div><h2>TV Series</h2>`;
  genres.forEach(g=>{
    const div=document.createElement("div");
    div.className="genre";
    div.textContent=g;
    if(g==="Sitcom") div.onclick=()=>openSitcomFolder();
    page.appendChild(div);
  });
}

function openSitcomFolder(){
  page.innerHTML=`<div class="back" onclick="openSeries()">← Back</div><h2>Sitcom</h2><div class="row" id="sitcom-row"></div>`;
  const row=document.getElementById("sitcom-row");

  sitcomShows.forEach(show=>{
    const tile=document.createElement("div");
    tile.className="tile";
    const img=document.createElement("img");
    img.src=show.poster;
    tile.appendChild(img);
    row.appendChild(tile);
  });

  const n=document.createElement("div");
  n.className="tile";
  n.onclick=()=>openNeighbourhoodFolder();
  const ni=document.createElement("img");
  ni.src=neighbourhoodPoster;
  n.appendChild(ni);
  row.appendChild(n);
}

function openNeighbourhoodFolder(){
  page.innerHTML=`
    <div class="back" onclick="openSitcomFolder()">← Back</div>
    <h2>The Neighbourhood</h2>
    <div class="row">
      <div class="tile" onclick="openNeighbourhoodSeason1()">
        <img src="${neighbourhoodPoster}">
        <div class="tile-label">Season 1</div>
      </div>
    </div>`;
}

function openNeighbourhoodSeason1(){
  page.innerHTML=`
    <div class="back" onclick="openNeighbourhoodFolder()">← Back</div>
    <h2>The Neighbourhood — Season 1</h2>
    <div class="row" id="s1"></div>`;
  const row=document.getElementById("s1");

  for(let ep=1;ep<=21;ep++){
    const tile=document.createElement("div");
    tile.className="tile";

    const v=document.createElement("video");
    v.src=`https://archive.org/download/the-neighborhood-season-1/The-Neighborhood-s1-e${ep}_720p.mp4`;
    v.controls=true;

    const key=`neighbourhood_s1_e${ep}`;
    const saved=localStorage.getItem(key);
    if(saved){
      try{
        const obj=JSON.parse(saved);
        if(obj.time && !isNaN(obj.time)){
          v.currentTime=obj.time;
        }
      }catch(e){}
    }

    v.addEventListener("timeupdate",()=>{
      const data={time:v.currentTime,duration:v.duration||0};
      localStorage.setItem(key,JSON.stringify(data));
      updateContinueWatching();
    });

    tile.appendChild(v);

    const label=document.createElement("div");
    label.className="tile-label";
    label.textContent=`Episode ${ep}`;
    tile.appendChild(label);

    row.appendChild(tile);
  }
}

function updateContinueWatching(){
  let total=0,watched=0;
  for(let ep=1;ep<=21;ep++){
    const key=`neighbourhood_s1_e${ep}`;
    const saved=localStorage.getItem(key);
    if(saved){
      try{
        const obj=JSON.parse(saved);
        if(obj.duration>0){
          total+=obj.duration;
          watched+=Math.min(obj.time,obj.duration);
        }
      }catch(e){}
    }
  }
  const bar=document.getElementById("cw-progress");
  if(total>0){
    const pct=Math.min(100,Math.round((watched/total)*100));
    bar.style.width=pct+"%";
  }else{
    bar.style.width="0%";
  }
}
updateContinueWatching();

function performSearch(){
  const q=(searchInput.value||"").trim().toLowerCase();
  if(!q){
    showHome();
    return;
  }

  const matches=[];
  sitcomShows.forEach(s=>{
    if(s.name.toLowerCase().includes(q)) matches.push({type:"sitcom",item:s});
  });
  if("the neighbourhood".includes(q) || q.includes("neighbour")){
    matches.push({type:"neighbourhood",item:{name:"The Neighbourhood",poster:neighbourhoodPoster}});
  }

  page.innerHTML=`<div class="back" onclick="showHome()">← Back</div><h2>Search: ${q}</h2><div class="row" id="search-row"></div>`;
  const row=document.getElementById("search-row");

  if(matches.length===0){
    row.innerHTML="<p>No results found.</p>";
    return;
  }

  matches.forEach(m=>{
    const tile=document.createElement("div");
    tile.className="tile";
    const img=document.createElement("img");
    img.src=m.item.poster;
    tile.appendChild(img);

    const label=document.createElement("div");
    label.className="tile-label";
    label.textContent=m.item.name;
    tile.appendChild(label);

    if(m.type==="neighbourhood"){
      tile.onclick=()=>openNeighbourhoodFolder();
    }
    row.appendChild(tile);
  });
}

async function castCurrent(){
  try{
    if (navigator.mediaSession) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "Casting from Netflex & Chill",
        artist: "Rukhsaar",
        album: "TV Series",
        artwork: [
          { src: "https://archive.org/download/series-poster-covers/THE_NEIGHBOURHOOD_POSTER.jpg", sizes: "512x512", type: "image/jpg" }
        ]
      });
    }

    if (navigator.cast && navigator.cast.showCastDialog) {
      navigator.cast.showCastDialog();
      return;
    }

    alert("On Android: swipe down → Cast / Smart View → select your TV.");
  } catch (e) {
    alert("Casting failed or not supported on this device.");
  }
}

async function mirrorCurrent(){
  try{
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video:true,
      audio:true
    });
    const video = document.createElement("video");
    video.srcObject = stream;
    video.play();
    alert("Screen mirroring started. Stop it from the Android sharing popup.");
  } catch (err) {
    alert("Mirroring cancelled or not supported.");
  }
}

async function wirelessDisplay(){
  alert("On Android: swipe down → Screen Cast / Smart View / Wireless Display → select your TV.");
}

showHome();
</script>

</body>
</html>
